<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CGPA Calculator – Sabari Giri</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e97b;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --success: #43e97b;
      --warning: #ffd166;
      --danger: #ff6584;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 500px; height: 500px; background: rgba(108,99,255,0.12); top: -150px; left: -100px; }
    .orb2 { width: 400px; height: 400px; background: rgba(255,101,132,0.08); bottom: -100px; right: -100px; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.8s ease both;
    }

    .badge {
      display: inline-block;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(108,99,255,0.5), transparent);
    }

    .card-title {
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* Controls */
    .control-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .control-row label {
      font-size: 0.9rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .num-input {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .num-input button {
      width: 40px; height: 40px;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .num-input button:hover { background: rgba(108,99,255,0.15); }

    .num-input span {
      width: 40px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      color: var(--text);
    }

    /* Subject rows */
    #subjects-container { display: flex; flex-direction: column; gap: 14px; }

    .subject-row {
      display: grid;
      grid-template-columns: auto 1fr 1fr;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.2s;
    }
    .subject-row:hover { border-color: rgba(108,99,255,0.3); }

    .subject-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(108,99,255,0.12);
      border-radius: 8px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .input-group { display: flex; flex-direction: column; gap: 4px; }
    .input-group label { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }

    select, input[type="number"] {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      padding: 8px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    select:focus, input[type="number"]:focus { border-color: var(--accent); }

    /* Credit stepper */
    .credit-stepper {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .credit-stepper button {
      width: 32px; height: 36px;
      background: none; border: none;
      color: var(--accent); font-size: 1rem;
      cursor: pointer; transition: background 0.2s; flex-shrink: 0;
    }
    .credit-stepper button:hover { background: rgba(108,99,255,0.15); }
    .credit-stepper span {
      flex: 1; text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem; color: var(--text);
    }

    /* Calculate button */
    .btn-calc {
      width: 100%;
      margin-top: 28px;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 30px rgba(108,99,255,0.3);
      text-transform: uppercase;
    }
    .btn-calc:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(108,99,255,0.45); }
    .btn-calc:active { transform: translateY(0); }

    /* Result */
    #result-section { display: none; }

    .cgpa-display {
      text-align: center;
      padding: 32px 20px;
    }

    .cgpa-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .cgpa-value {
      font-size: clamp(3rem, 12vw, 6rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }

    .cgpa-bar-wrap {
      background: var(--surface);
      border-radius: 20px;
      height: 8px;
      margin: 20px auto;
      max-width: 400px;
      overflow: hidden;
    }
    .cgpa-bar {
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      width: 0%;
    }

    .motivation-box {
      border-radius: 14px;
      padding: 16px 20px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 20px;
    }

    /* Chart */
    .chart-wrap {
      position: relative;
      height: 280px;
      margin-top: 10px;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 48px;
      color: var(--muted);
      font-size: 0.85rem;
      animation: fadeUp 1s ease both;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      margin: 0 10px;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--accent2); }

    .social-links { margin-top: 12px; display: flex; justify-content: center; gap: 16px; }
    .social-links a {
      display: flex; align-items: center; gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.82rem;
      color: var(--muted);
      transition: all 0.2s;
    }
    .social-links a:hover { border-color: var(--accent); color: var(--text); }
    .social-links img { width: 16px; height: 16px; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 500px) {
      .subject-row { grid-template-columns: auto 1fr; }
      .subject-row .input-group:last-child { grid-column: 2; }
    }
  </style>
</head>
<body>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>

  <div class="container">
    <header>
      <div class="badge">📊 Academic Tool</div>
      <h1>CGPA Calculator</h1>
      <p class="subtitle">Track your Grade Point Average with precision</p>
    </header>

    <!-- Input Card -->
    <div class="card" style="animation-delay:0.1s">
      <div class="card-title">⚙ Configure Subjects</div>

      <div class="control-row">
        <label>Number of Subjects</label>
        <div class="num-input">
          <button onclick="changeSubjects(-1)">−</button>
          <span id="subject-count">5</span>
          <button onclick="changeSubjects(1)">+</button>
        </div>
      </div>

      <div id="subjects-container"></div>

      <button class="btn-calc" onclick="calculateCGPA()">Calculate CGPA</button>
    </div>

    <!-- Result Card -->
    <div class="card" id="result-section" style="animation-delay:0.2s">
      <div class="card-title">🎯 Your Result</div>
      <div class="cgpa-display">
        <div class="cgpa-label">Cumulative Grade Point Average</div>
        <div class="cgpa-value" id="cgpa-value">0.00</div>
        <div class="cgpa-bar-wrap"><div class="cgpa-bar" id="cgpa-bar"></div></div>
        <div class="motivation-box" id="motivation-box"></div>
      </div>
    </div>

    <!-- Graph Card -->
    <div class="card" id="graph-section" style="display:none; animation-delay:0.3s">
      <div class="card-title">📈 Performance Graph</div>
      <div class="chart-wrap">
        <canvas id="cgpaChart"></canvas>
      </div>
    </div>

    <footer>
      <p>Made with ❤️ by <strong>SABARI GIRI</strong></p>
      <div class="social-links">
        <a href="https://www.linkedin.com/in/sabari-giri-57728032a" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png"> LinkedIn
        </a>
        <a href="https://github.com/sabarigiriai75-bit" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"> GitHub
        </a>
      </div>
    </footer>
  </div>

  <script>
    const gradeMap = { "O": 10, "A+": 9, "A": 8, "B+": 7, "B": 6, "C": 5, "RA": 0 };
    const grades = Object.keys(gradeMap);
    let numSubjects = 5;
    let chartInstance = null;

    function buildSubjects() {
      const c = document.getElementById('subjects-container');
      c.innerHTML = '';
      for (let i = 0; i < numSubjects; i++) {
        const row = document.createElement('div');
        row.className = 'subject-row';
        row.style.animationDelay = `${i * 0.05}s`;

        const gradeOptions = grades.map(g => `<option value="${g}">${g}</option>`).join('');

        row.innerHTML = `
          <span class="subject-label">S${i+1}</span>
          <div class="input-group">
            <label>Grade</label>
            <select id="grade-${i}">${gradeOptions}</select>
          </div>
          <div class="input-group">
            <label>Credits</label>
            <div class="credit-stepper">
              <button onclick="changeCredit(${i},-0.5)">−</button>
              <span id="credit-val-${i}">3.0</span>
              <button onclick="changeCredit(${i},0.5)">+</button>
            </div>
          </div>`;
        c.appendChild(row);
      }
    }

    function changeSubjects(delta) {
      numSubjects = Math.max(1, Math.min(12, numSubjects + delta));
      document.getElementById('subject-count').textContent = numSubjects;
      buildSubjects();
      document.getElementById('result-section').style.display = 'none';
      document.getElementById('graph-section').style.display = 'none';
    }

    function changeCredit(i, delta) {
      const el = document.getElementById(`credit-val-${i}`);
      let val = parseFloat(el.textContent) + delta;
      val = Math.max(0.5, Math.min(10, val));
      el.textContent = val.toFixed(1);
    }

    function calculateCGPA() {
      let totalPoints = 0, totalCredits = 0;
      const gps = [], creds = [];

      for (let i = 0; i < numSubjects; i++) {
        const g = document.getElementById(`grade-${i}`).value;
        const c = parseFloat(document.getElementById(`credit-val-${i}`).textContent);
        const gp = gradeMap[g];
        totalPoints += gp * c;
        totalCredits += c;
        gps.push(gp);
        creds.push(c);
      }

      const cgpa = totalCredits > 0 ? totalPoints / totalCredits : 0;

      // Show result
      const resultEl = document.getElementById('result-section');
      resultEl.style.display = 'block';
      resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

      // Animate CGPA value
      const valEl = document.getElementById('cgpa-value');
      let current = 0;
      const target = cgpa;
      const duration = 1000;
      const step = 16;
      const increment = target / (duration / step);
      const timer = setInterval(() => {
        current = Math.min(current + increment, target);
        valEl.textContent = current.toFixed(2);
        if (current >= target) clearInterval(timer);
      }, step);

      // Color
      let color;
      if (cgpa >= 9) color = '#43e97b';
      else if (cgpa >= 8) color = '#38f9d7';
      else if (cgpa >= 7) color = '#6c63ff';
      else if (cgpa >= 6) color = '#ffd166';
      else color = '#ff6584';

      valEl.style.background = `linear-gradient(135deg, ${color}, #fff)`;
      valEl.style.webkitBackgroundClip = 'text';
      valEl.style.webkitTextFillColor = 'transparent';

      // Bar
      setTimeout(() => {
        document.getElementById('cgpa-bar').style.width = `${(cgpa / 10) * 100}%`;
      }, 100);

      // Motivation
      const motEl = document.getElementById('motivation-box');
      if (cgpa >= 9) {
        motEl.style.background = 'rgba(67,233,123,0.1)';
        motEl.style.border = '1px solid rgba(67,233,123,0.3)';
        motEl.style.color = '#43e97b';
        motEl.textContent = '🌟 Excellent! Your hard work is paying off!';
      } else if (cgpa >= 8) {
        motEl.style.background = 'rgba(56,249,215,0.1)';
        motEl.style.border = '1px solid rgba(56,249,215,0.3)';
        motEl.style.color = '#38f9d7';
        motEl.textContent = '👏 Great job! Keep pushing higher!';
      } else if (cgpa >= 7) {
        motEl.style.background = 'rgba(108,99,255,0.1)';
        motEl.style.border = '1px solid rgba(108,99,255,0.3)';
        motEl.style.color = '#a78bfa';
        motEl.textContent = '👍 Good work! A little more effort can push you higher!';
      } else if (cgpa >= 6) {
        motEl.style.background = 'rgba(255,209,102,0.1)';
        motEl.style.border = '1px solid rgba(255,209,102,0.3)';
        motEl.style.color = '#ffd166';
        motEl.textContent = '⚡ You can improve. Stay focused!';
      } else {
        motEl.style.background = 'rgba(255,101,132,0.1)';
        motEl.style.border = '1px solid rgba(255,101,132,0.3)';
        motEl.style.color = '#ff6584';
        motEl.textContent = "💡 Don't give up! Work harder next semester!";
      }

      // Graph
      document.getElementById('graph-section').style.display = 'block';
      const labels = [], data = [];
      let cumPoints = 0, cumCredits = 0;
      for (let i = 0; i < numSubjects; i++) {
        cumPoints += gps[i] * creds[i];
        cumCredits += creds[i];
        labels.push(`S${i+1}`);
        data.push((cumPoints / cumCredits).toFixed(2));
      }

      if (chartInstance) chartInstance.destroy();
      const ctx = document.getElementById('cgpaChart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Cumulative CGPA',
            data,
            backgroundColor: data.map(v => {
              const pct = v / 10;
              return `rgba(108,99,255,${0.3 + pct * 0.5})`;
            }),
            borderColor: '#6c63ff',
            borderWidth: 2,
            borderRadius: 8,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a26',
              titleColor: '#a78bfa',
              bodyColor: '#e8e8f0',
              borderColor: '#2a2a3d',
              borderWidth: 1,
            }
          },
          scales: {
            y: {
              min: 0, max: 10,
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#6b6b8a', font: { family: 'DM Mono' } },
            },
            x: {
              grid: { display: false },
              ticks: { color: '#6b6b8a', font: { family: 'DM Mono' } },
            }
          },
          animation: { duration: 1000, easing: 'easeOutQuart' }
        }
      });
    }

    // Init
    buildSubjects();
  </script>
</body>
</html>
